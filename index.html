<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Downloader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src='//libtl.com/sdk.js' data-zone='11246502' data-sdk='show_11246502'></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
            text-align: center;
        }
        .container {
            background-color: #2c2c2e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }
        h2 { margin-bottom: 10px; color: #0a84ff; }
        .status { font-size: 16px; margin: 20px 0; color: #eaeaea; }
        .timer { font-size: 24px; font-weight: bold; color: #ff9f0a; }
        .btn {
            display: none;
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn-smartlink { background-color: #ff9f0a; color: white; }
        .btn-final { background-color: #30d158; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>File Downloader</h2>
    <p style="color: #aaa; font-size: 14px;">Complete the step to get your file</p>
    
    <div id="timer-section" class="status">
        Checking secure link... <br>
        <span id="countdown" class="timer">10</span> seconds
    </div>

    <button id="smartlink-btn" class="btn btn-smartlink" onclick="triggerPopkornAd()">🔓 Unlock Your File</button>

    <button id="final-btn" class="btn btn-final" onclick="redirectToBot()">📥 Get File (Back to Bot)</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_USERNAME = "Hotpopkornbot"; 
    const urlParams = new URLSearchParams(window.location.search);
    const fileId = urlParams.get('fid');

    let timeLeft = 10;
    const countdownEl = document.getElementById('countdown');
    const timerSection = document.getElementById('timer-section');
    const smartlinkBtn = document.getElementById('smartlink-btn');
    const finalBtn = document.getElementById('final-btn');

    // 10 Second Timer Logic
    const timer = setInterval(() => {
        timeLeft--;
        countdownEl.innerText = timeLeft;
        
        if (timeLeft <= 0) {
            clearInterval(timer);
            timerSection.style.display = 'none';
            smartlinkBtn.style.display = 'block'; 
        }
    }, 1000);

    // 🟢 2. MONETAG AD KO SHOW KARNE KA LOGIC 🟢
    function triggerPopkornAd() {
        // Monetag SDK native promise provide karta hai jab user ad close ya click karta hai
        if (typeof show_11246502 === 'function') {
            show_11246502().then(() => {
                // Ad successfully complete hote hi download button show hoga
                smartlinkBtn.style.display = 'none'; 
                finalBtn.style.display = 'block';
            }).catch((err) => {
                // Safe Fallback: Agar ad me error aaye toh bhi user ka download button block na ho
                console.log("Ad Error:", err);
                smartlinkBtn.style.display = 'none'; 
                finalBtn.style.display = 'block';
            });
        } else {
            // Agar ad block ho ya load na hua ho
            smartlinkBtn.style.display = 'none'; 
            finalBtn.style.display = 'block';
        }
    }

    // Bot me wapas redirect karne ke liye
    function redirectToBot() {
        if (fileId) {
            const redirectUrl = `https://t.me/${BOT_USERNAME}?start=getfile_${fileId}`;
            tg.openTelegramLink(redirectUrl);
            tg.close();
        } else {
            alert("Error: File reference identity missing!");
        }
    }
</script>

</body>
</html>
