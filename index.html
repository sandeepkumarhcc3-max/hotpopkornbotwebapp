<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Downloader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src='//libtl.com/sdk.js' data-zone='11246502' data-sdk='show_11246502'></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; 
            height: 95vh;
            text-align: center;
            box-sizing: border-box;
        }
        .ad-container-top, .ad-container-bottom {
            width: 100%;
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 12px;
            color: #666;
        }
        .container {
            background-color: #2c2c2e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            margin: auto 0; 
        }
        h2 { margin-bottom: 10px; color: #0a84ff; }
        .status { font-size: 16px; margin: 20px 0; color: #eaeaea; }
        .timer { font-size: 24px; font-weight: bold; color: #ff9f0a; }
        .btn {
            display: none;
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn-smartlink { background-color: #ff9f0a; color: white; }
        .btn-final { background-color: #30d158; color: white; }
    </style>
</head>
<body>

<div class="ad-container-top">
    <div id="monetag-top-ad">Loading Advertisement...</div>
</div>

<div class="container">
    <h2>File Downloader</h2>
    <p style="color: #aaa; font-size: 14px;">Complete the step to get your file</p>
    
    <div id="timer-section" class="status">
        Checking secure link... <br>
        <span id="countdown" class="timer">25</span> seconds
    </div>

    <button id="smartlink-btn" class="btn btn-smartlink" onclick="triggerPopkornAd()">🔓 Unlock Your File</button>

    <button id="final-btn" class="btn btn-final" onclick="redirectToBot()">📥 Get File (Back to Bot)</button>
</div>

<div class="ad-container-bottom">
    <div id="monetag-bottom-ad">Loading Advertisement...</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_USERNAME = "Hotpopkornbot"; 
    const urlParams = new URLSearchParams(window.location.search);
    const fileId = urlParams.get('fid');

    // Timer ko 10 se badalkar 25 kar diya gaya hai
    let timeLeft = 25;
    const countdownEl = document.getElementById('countdown');
    const timerSection = document.getElementById('timer-section');
    const smartlinkBtn = document.getElementById('smartlink-btn');
    const finalBtn = document.getElementById('final-btn');

    // 25 Second Timer Logic
    const timer = setInterval(() => {
        timeLeft--;
        countdownEl.innerText = timeLeft;
        
        if (timeLeft <= 0) {
            clearInterval(timer);
            timerSection.style.display = 'none';
            smartlinkBtn.style.display = 'block'; 
        }
    }, 1000);

    // Page load hote hi In-App Interstitial Ad aur baki ads initialize karne ke liye
    window.onload = function() {
        if (typeof show_11246502 === 'function') {
            console.log("Monetag Ads Initialized");
            
            // Aapka diya hua In-App Interstitial Code
            show_11246502({
              type: 'inApp',
              inAppSettings: {
                frequency: 2,
                capping: 0.1,
                interval: 30,
                timeout: 5, // 5 seconds ke delay ke baad automatic show hoga
                everyPage: false
              }
            });
        }
    };

    // UNLOCK BUTTON CLICK LOGIC
    function triggerPopkornAd() {
        if (typeof show_11246502 === 'function') {
            show_11246502().then(() => {
                smartlinkBtn.style.display = 'none'; 
                finalBtn.style.display = 'block';
            }).catch((err) => {
                console.log("Ad Error:", err);
                smartlinkBtn.style.display = 'none'; 
                finalBtn.style.display = 'block';
            });
        } else {
            smartlinkBtn.style.display = 'none'; 
            finalBtn.style.display = 'block';
        }
    }

    // Bot me wapas redirect karne ke liye
    function redirectToBot() {
        if (fileId) {
            const redirectUrl = `https://t.me/${BOT_USERNAME}?start=getfile_${fileId}`;
            tg.openTelegramLink(redirectUrl);
            tg.close();
        } else {
            alert("Error: File reference identity missing!");
        }
    }
</script>

</body>
</html>
