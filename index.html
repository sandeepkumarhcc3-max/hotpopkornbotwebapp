<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Downloader</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
            text-align: center;
        }
        .container {
            background-color: #2c2c2e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }
        h2 { margin-bottom: 10px; color: #0a84ff; }
        .status { font-size: 16px; margin: 20px 0; color: #eaeaea; }
        .timer { font-size: 24px; font-weight: bold; color: #ff9f0a; }
        .btn {
            display: none;
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn-smartlink { background-color: #ff9f0a; color: white; display: none; }
        .btn-final { background-color: #30d158; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>File Downloader</h2>
    <p style="color: #aaa; font-size: 14px;">Complete the step to get your file</p>
    
    <div id="timer-section" class="status">
        Checking secure link... <br>
        <span id="countdown" class="timer">10</span> seconds
    </div>

    <a id="smartlink-btn" class="btn btn-smartlink" href="#" target="_blank" onclick="onAdClicked()">🔓 Unlock Your File</a>

    <button id="final-btn" class="btn btn-final" onclick="redirectToBot()">📥 Get File (Back to Bot)</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 🔴 APNA MONETAG SMARTLINK YAHAN PASTE KAREIN 🔴
    const MONETAG_SMARTLINK = "https://vxmlp.com/your-smartlink-placeholder"; 
    const BOT_USERNAME = "Hotpopkornbot"; 

    const urlParams = new URLSearchParams(window.location.search);
    const fileId = urlParams.get('fid');

    let timeLeft = 10;
    const countdownEl = document.getElementById('countdown');
    const timerSection = document.getElementById('timer-section');
    const smartlinkBtn = document.getElementById('smartlink-btn');
    const finalBtn = document.getElementById('final-btn');

    smartlinkBtn.href = MONETAG_SMARTLINK;

    // 10 Second Timer Logic
    const timer = setInterval(() => {
        timeLeft--;
        countdownEl.innerText = timeLeft;
        
        if (timeLeft <= 0) {
            clearInterval(timer);
            timerSection.style.display = 'none';
            smartlinkBtn.style.display = 'block'; 
        }
    }, 1000);

    // Jab user Monetag link par click karega
    function onAdClicked() {
        setTimeout(() => {
            smartlinkBtn.style.display = 'none'; 
            finalBtn.style.display = 'block'; 
        }, 1500); 
    }

    // Bot me wapas redirect karne ke liye
    function redirectToBot() {
        if (fileId) {
            const redirectUrl = `https://t.me/${BOT_USERNAME}?start=getfile_${fileId}`;
            tg.openTelegramLink(redirectUrl);
            tg.close();
        } else {
            alert("Error: File reference identity missing!");
        }
    }
</script>

</body>
</html>
